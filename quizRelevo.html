<!DOCTYPE html>
<html>
    <head>
        <title>Quiz Relevos</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
        <link rel="stylesheet" href="https://code.getmdl.io/1.1.3/material.indigo-pink.min.css">
        <script defer src="https://code.getmdl.io/1.1.3/material.min.js"></script>
        <link rel="stylesheet" type="text/css" href="css/style.css" />
    </head>
    <body>
        <header class="demo-header mdl-layout__header mdl-layout__header--scroll mdl-color--black-800 mdl-color-text--white-100">
            <div class="mdl-layout__header-row">
                <span class="mdl-layout-title">SIEGE</span>
                <div class="mdl-layout-spacer"></div>
                <div class="mdl-textfield mdl-js-textfield mdl-textfield--expandable">
                    <label class="mdl-button mdl-js-button mdl-button--icon" for="search">
                        <i class="material-icons">search</i>
                    </label>
                    <div class="mdl-textfield__expandable-holder">
                        <input class="mdl-textfield__input" type="text" id="search">
                        <label class="mdl-textfield__label" for="search">Sua pesquisa</label>
                    </div>
                </div>
            </div>
        </header>

        <div class="demo-card-wide mdl-card mdl-shadow--2dp">
            <div class="mdl-card__title" id="relevoQuiz">
                <h2 class="mdl-card__title-text">Relevo 1/5</h2>
            </div>
            <div class="mdl-card__media">
                <h4>Questao?</h4>
            </div>
            <div class="mdl-card__supporting-text">
                <form action="#">
                    <div class="mdl-textfield mdl-js-textfield mdl-textfield--floating-label">
                        <input class="mdl-textfield__input" type="text" id="resposta">
                        <label class="mdl-textfield__label" for="resposta">Resposta</label>
                    </div>
                </form>
            </div>
            <div class="mdl-card__actions mdl-card--border">
                <a class="mdl-button mdl-button--colored mdl-js-button mdl-js-ripple-effect">
                    Próxima
                </a>
            </div>
        </div>
    </body>

</html>
