<!DOCTYPE html>
<html>
    <head>
        <title>Quiz Capitais</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="vendor/icon.css">
        <link rel="stylesheet" href="vendor/material.indigo-pink.min.css">
        <script defer src="vendor/material.min.js"></script>
        <link rel="stylesheet" type="text/css" href="css/style.css" />
    </head>
    <body>
        <header class="demo-header mdl-layout__header mdl-layout__header--scroll mdl-color--black-800 mdl-color-text--white-100">
            <div class="mdl-layout__header-row">
                <a class="mdl-navigation__link" href="/"><span class="mdl-layout-title">SIEGE</span></a>
                <div class="mdl-layout-spacer"></div>
                <div class="mdl-textfield mdl-js-textfield mdl-textfield--expandable">
                    <label class="mdl-button mdl-js-button mdl-button--icon" for="search">
                        <i class="material-icons">search</i>
                    </label>
                    <div class="mdl-textfield__expandable-holder">
                        <input class="mdl-textfield__input" type="text" id="search">
                        <label class="mdl-textfield__label" for="search">Sua pesquisa</label>
                    </div>
                </div>
            </div>
        </header>

        <div class="demo-card-wide mdl-card mdl-shadow--2dp">
            <div class="mdl-card__title" id="capitalQuiz">
                <h2 class="mdl-card__title-text">Capital&nbsp;&nbsp;&nbsp;&nbsp;<span class="currentQuestion">1</span>/<span class="totalQuestion">5</span></h2>
            </div>
            <div class="mdl-card__media">
                <h4 id="questao">Questao?</h4>
            </div>
            <div class="mdl-card__supporting-text">
                <div class="mdl-textfield mdl-js-textfield mdl-textfield--floating-label">
                    <input class="mdl-textfield__input" type="text" id="resposta" name="resposta">
                    <label class="mdl-textfield__label" for="resposta">Resposta</label>
                </div>
            </div>
            <div class="mdl-card__actions mdl-card--border">
                <a class="mdl-button mdl-button--colored mdl-js-button mdl-js-ripple-effect nextButton">
                    Próxima
                </a>
                <a class="mdl-button mdl-button--colored mdl-js-button mdl-js-ripple-effect fimButton hidden">
                    Finalizar
                </a>
            </div>
        </div>
        <div class="fimQuestion hidden">
            <div class="mdl-grid">
                <div class="mdl-cell mdl-cell--4-col"></div>
                <div class="mdl-cell mdl-cell--4-col">
                    <h1 class="principal">Parabéns</h1>
                    <h3 class="principalPontos">Você fez <span id="pontos"></span></h3>
                    <h4 class="mensagem">Continue assim</h4>
                    <a class="mdl-button mdl-js-button mdl-button--raised mdl-js-ripple-effect mdl-button--accent" href="/">
                        Início
                    </a>
                </div>
                <div class="mdl-cell mdl-cell--4-col"></div>
            </div>
        </div>
        <script src="vendor/jquery.min.js"></script>
        <script type="text/javascript" src="js/quizCapital.js"></script>
    </body>

</html>
