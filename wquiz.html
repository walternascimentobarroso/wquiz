<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8">
    <link href="/img/favicon.ico" rel="shortcut icon">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/materialize/0.100.2/css/materialize.min.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="msapplication-TileColor" content="#ffffff">
    <meta name="theme-color" content="#ffffff">
    <title>WQUIZ</title>
  </head>
  <body>
    <header>
      <nav>
        <div class="nav-wrapper">
          <ul class="left hide-on-med-and-down" id="nav-mobile">
            <li><a href="index.html">Questões</a></li>
          </ul><a class="brand-logo center" href="index.html">WQuiz</a>
        </div>
      </nav>
    </header>
    <main class="container center-align">
      <div class="row"><img class="circle responsive-img" src="img/loading.gif" id="imgconent">
        <div class="col s12 m12 hide" id="contentnoimg">
          <div class="card-panel teal"><span class="white-text left"> <span id="questionpage">1 </span><span>&nbsp;- </span><span id="totalquestion">25</span></span><span class="white-text right" id="time">12:00</span>
            <div class="progress">
              <div class="determinate red"></div>
            </div>
          </div>
          <div class="card blue-grey darken-1">
            <div class="progress">
              <div class="determinate" id="progressbar"></div>
            </div>
            <div class="card-content white-text"><span class="card-title" id="question">Questão</span>
              <div class="left-align" id="choices">Respostas</div>
              <div id="piechart"></div>
            </div>
            <div class="card-action">
              <button class="left waves-effect waves-light btn blue darken-1" disabled="disabled" id="anterior">Anterior</button>
              <button class="waves-effect waves-light btn blue darken-3" id="submit">Enviar</button>
              <button class="right waves-effect waves-light btn red" id="gameover" disabled="disabled">Finalizar</button><a class="right waves-effect waves-light btn hide" href="/" id="back">Voltar</a>
            </div>
            <div id="content"></div>
          </div>
        </div>
      </div>
    </main>
    <script src="js/quiz.js"></script>
    <footer class="page-footer">
      <div class="container">
        <div class="row">
          <div class="col l6 s12">
            <h5 class="white-text">WQuiz</h5>
            <p class="grey-text text-lighten-4">Sistema de pergunta e respostas.</p>
          </div>
          <div class="col l4 offset-l2 s12">
            <h5 class="white-text">Download</h5>
            <ul>
              <li><img src="img/google-play-store_pt.png" width="220" height="50" alt="Baixe para o Android"></li>
              <li><img src="img/app-store_pt.png" width="220" height="50" alt="Baixe para o Iphone"></li>
            </ul>
          </div>
        </div>
      </div>
      <div class="footer-copyright">
        <div class="container">© 2018 Copyright<a class="grey-text text-lighten-4 right" href="https://walternascimentobarroso.github.io/">Walter Nascimento Barroso</a></div>
      </div>
    </footer>
    <script src="https://code.jquery.com/jquery-3.2.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/materialize/0.100.2/js/materialize.min.js"></script>
    <script src="js/script.js"></script>
    <script src="js/quiz.js"></script>
  </body>
</html>
