<!DOCTYPE html>
<html>
    <head>
        <title>Quiz Capitais</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="vendor/icon.css">
        <link rel="stylesheet" href="vendor/material.indigo-pink.min.css">
        <script defer src="vendor/material.min.js"></script>
        <link rel="stylesheet" href="css/normalize.css">
        <link rel='stylesheet prefetch' href='vendor/fonts.css'>
        <link rel='stylesheet prefetch' href='vendor/jquery.mCustomScrollbar.min.css'>
        <link rel="stylesheet" type="text/css" href="css/chat.css" />
    </head>
    <body>
        <header class="demo-header mdl-layout__header mdl-layout__header--scroll mdl-color--black-800 mdl-color-text--white-100">
            <div class="mdl-layout__header-row">
                <span class="mdl-layout-title">SIEGE</span>
                <div class="mdl-layout-spacer"></div>
                <div class="mdl-textfield mdl-js-textfield mdl-textfield--expandable">
                    <label class="mdl-button mdl-js-button mdl-button--icon" for="search">
                        <i class="material-icons">search</i>
                    </label>
                    <div class="mdl-textfield__expandable-holder">
                        <input class="mdl-textfield__input" type="text" id="search">
                        <label class="mdl-textfield__label" for="search">Sua pesquisa</label>
                    </div>
                </div>
            </div>
        </header>

        <div class="chat">
            <div class="chat-title">
                <h1>Professor SIEGE</h1>
                <h2>Chat</h2>
                <figure class="avatar">
                    <img src="img/mapabrasil.png" /></figure>
            </div>
            <div class="messages">
                <div class="messages-content"></div>
            </div>
            <div class="message-box">
                <textarea type="text" class="message-input" placeholder="Escreva sua mensagem..."></textarea>
                <button type="submit" class="message-submit">Enviar</button>
            </div>

        </div>
        <!--<div class="bg"></div>-->


        <script src="vendor/jquery.min.js"></script>
        <script src='vendor/jquery.mCustomScrollbar.concat.min.js'></script>
        <script type="text/javascript" src="js/chatterbot.js"></script>
    </body>

</html>
